          <div style="display:flex;gap:4px">
            <button onclick="abrirFormMotorista('${m.id}')" style="background:transparent;border:none;cursor:pointer;font-size:16px;padding:4px">✏️</button>
          </div>
        </div>
      </div>`).join('')}
    ${MOTORISTAS.length===0?'<p class="empty">Nenhum motorista cadastrado</p>':''}`;
}
function abrirFormMotorista(mid){
  mid=mid||null;
  const m=mid?MOTORISTAS.find(x=>x.id===mid):{};
  openModal(mid?'Editar Motorista':'Novo Motorista',`
    <div><label class="fl">Nome *</label><input id="mt-n" value="${m.nome||''}" style="${si}"></div>
    <div><label class="fl">E-mail * <span style="color:#6b7280;font-size:9px">(obrigatório)</span></label><input id="mt-email" type="email" value="${m.email||''}" placeholder="motorista@email.com" style="${si}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="fl">Telefone * <span style="color:#6b7280;font-size:9px">(obrigatório)</span></label><input id="mt-tel" value="${m.telefone||''}" placeholder="+55 31 9 9999-9999" style="${si}"></div>
      <div><label class="fl">WhatsApp</label><input id="mt-whats" value="${m.whatsapp||''}" placeholder="+55 31 99999-9999" style="${si}"></div>
    </div>
    <div><label class="fl">CallMeBot API Key</label><input id="mt-wkey" value="${m.callmebot_key||''}" placeholder="123456" style="${si}"></div>
    <div style="background:#f0fdf4;border-radius:8px;padding:8px 12px;font-size:11px;color:#166534;line-height:1.6">
      📱 <b>Ativar WhatsApp:</b> Salve <b>+34 698 28 89 73</b> como "CallMeBot" → Envie: <i>"I allow callmebot to send me messages"</i> → Receba o API Key<br>
      <button onclick="window.open('https://wa.me/34698288973?text=I+allow+callmebot+to+send+me+messages','_blank')" style="margin-top:6px;background:#25d366;color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600">📲 Abrir WhatsApp para ativar</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="fl">CNH</label><input id="mt-cnh" value="${m.cnh||''}" style="${si}"></div>
      <div><label class="fl">Categoria</label><select id="mt-cat" style="${ss}">${sopts(['A','B','C','D','E','AB','AC'],m.categoria_cnh||'B')}</select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="fl">Pontos CNH</label><input type="number" id="mt-pts" value="${m.pontos_cnh||0}" style="${si}"></div>
      <div><label class="fl">Status</label><select id="mt-st" style="${ss}">${sopts(['Ativo','Inativo','Suspenso'],m.status||'Ativo')}</select></div>
    </div>
    <div><label class="fl">OS / CC</label><select id="mt-os" style="${ss}">${osOpts(m.os_cc||'')}</select></div>
    ${btnSalvar(mid,'excluirMotorista','salvarMotorista')}`);}
async function salvarMotorista(mid){
  const nome=g('mt-n')?.value;if(!nome){toast('Nome obrigatório','err');return;}
  const email=g('mt-email')?.value?.trim()||'';
  const tel=g('mt-tel')?.value?.trim()||'';
  if(!email){toast('E-mail é obrigatório','err');return;}
  if(!tel){toast('Telefone é obrigatório','err');return;}
  const d={empresa_id:EMPRESA.id,nome,email,telefone:tel,whatsapp:g('mt-whats')?.value||'',callmebot_key:g('mt-wkey')?.value||'',cnh:g('mt-cnh')?.value||'',categoria_cnh:g('mt-cat')?.value||'',pontos_cnh:parseInt(g('mt-pts')?.value)||0,status:g('mt-st')?.value||'Ativo',os_cc:g('mt-os')?.value||''};
  if(mid)await SB.from('motoristas').update(d).eq('id',mid);else await SB.from('motoristas').insert(d);
  await loadData();closeModal();renderMotoristas();toast('Motorista salvo!');
}
async function excluirMotorista(mid){if(!confirm('Excluir?'))return;await SB.from('motoristas').delete().eq('id',mid);await loadData();closeModal();renderMotoristas();}

// ── RELATÓRIO ────────────────────────────────────────────
// DUP: let rF='todos',rPlaca='',rCat='',rOS='',rDI='',rDF='',rAno=new Date().getFullYear(),rMes=new Date().getMonth();
// DUP: const CATS=['Troca de Óleo','Filtros','Freios','Suspensão','Pneus - Troca','Pneus - Alinhamento/Balanceamento','Embreagem','Motor','Transmissão / Câmbio','Sistema Elétrico','Ar-condicionado','Bateria','Correias','Revisão Geral','Funilaria / Pintura','Lanternagem e Pintura','Vidros','Documentação de Veículos','Outros'];
function renderRelatorio(){
  const el2=g('tab-relatorio');if(!el2)return;
  const vF=rF==='leve'?VEICULOS.filter(v=>!isPesado(v.tipo)):rF==='pesado'?VEICULOS.filter(v=>isPesado(v.tipo)):VEICULOS;
  const vIds=vF.map(v=>v.id);
  const placasU=[...new Set(MANUTENCOES.map(m=>m.veiculos?.placa).filter(Boolean))].sort();
  const osU=[...new Set(MANUTENCOES.map(m=>m.os_cc).filter(Boolean))].sort();
  const filtered=MANUTENCOES.filter(m=>{
    if(!m.data)return false;
    if(rDI||rDF){if(rDI&&m.data<rDI)return false;if(rDF&&m.data>rDF)return false;}
    else{const d=new Date(m.data+'T12:00');if(d.getMonth()!==rMes||d.getFullYear()!==rAno)return false;}
    if(rF!=='todos'&&!vIds.includes(m.veiculo_id))return false;
    if(rPlaca&&(m.veiculos?.placa||'')!==rPlaca)return false;
    if(rCat&&(m.categoria||'')!==rCat)return false;
    if(rOS&&String(m.os_cc||'')!==rOS)return false;
    return true;
  });
  const total=filtered.reduce((s,m)=>s+(m.valor||0),0);
  const porPlaca={};filtered.forEach(m=>{const p=m.veiculos?.placa||'—';porPlaca[p]=(porPlaca[p]||0)+(m.valor||0);});
  const rank=Object.entries(porPlaca).sort((a,b)=>b[1]-a[1]);
  const MESES_N=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  el2.innerHTML=`
    <div style="font-weight:700;font-size:16px;color:#111827;margin-bottom:14px">📄 Relatório de Manutenções</div>
    <div style="background:#fff;border-radius:13px;border:1px solid #e5e7eb;padding:14px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:10px">🔍 Filtros</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label class="fl">Data inicial</label><input type="date" value="${rDI}" onchange="rDI=this.value;renderRelatorio()" style="${si}"></div>
        <div><label class="fl">Data final</label><input type="date" value="${rDF}" onchange="rDF=this.value;renderRelatorio()" style="${si}"></div>
      </div>
      ${!rDI&&!rDF?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label class="fl">Mês</label><select onchange="rMes=+this.value;renderRelatorio()" style="${ss}">${MESES_N.map((m,i)=>`<option value="${i}"${i===rMes?' selected':''}>${m}</option>`).join('')}</select></div>
        <div><label class="fl">Ano</label><select onchange="rAno=+this.value;renderRelatorio()" style="${ss}">${[2024,2025,2026,2027].map(y=>`<option value="${y}"${y===rAno?' selected':''}>${y}</option>`).join('')}</select></div>
      </div>`:''}
      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        ${[['todos','Todos'],['leve','🚗 Leves'],['pesado','🚛 Pesados']].map(([k,l])=>`<button onclick="rF='${k}';renderRelatorio()" style="padding:6px 11px;font-size:12px;font-weight:${rF===k?700:500};border-radius:9px;border:1.5px solid ${rF===k?'#1e3a5f':'#e5e7eb'};background:${rF===k?'#eff6ff':'#fff'};color:${rF===k?'#1e3a5f':'#6b7280'};cursor:pointer;font-family:inherit">${l}</button>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label class="fl">Placa</label><select onchange="rPlaca=this.value;renderRelatorio()" style="${ss}"><option value="">Todas</option>${placasU.map(p=>`<option value="${p}"${p===rPlaca?' selected':''}>${p}</option>`).join('')}</select></div>
        <div><label class="fl">Categoria</label><select onchange="rCat=this.value;renderRelatorio()" style="${ss}"><option value="">Todas</option>${CATS.map(c=>`<option value="${c}"${c===rCat?' selected':''}>${c}</option>`).join('')}</select></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select onchange="rOS=this.value;renderRelatorio()" style="flex:1;${ss}"><option value="">Todas OS</option>${osU.map(o=>`<option value="${o}"${o===rOS?' selected':''}>${o}</option>`).join('')}</select>
        ${rPlaca||rCat||rOS||rDI||rDF?`<button onclick="rPlaca='';rCat='';rOS='';rDI='';rDF='';renderRelatorio()" style="background:transparent;border:none;color:#dc2626;cursor:pointer;font-family:inherit;font-size:12px">✕ Limpar</button>`:''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="kpi2"><div class="kn2">${filtered.length}</div><div class="kl2">Lançamentos</div></div>
      <div class="kpi2"><div class="kn2" style="font-size:15px">${fmt$(total)}</div><div class="kl2">Total gasto</div></div>
    </div>
    ${rank.length?`<div class="card2" style="margin-bottom:12px"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px;color:#111827">🏆 Ranking do período</div>${rank.map(([placa,val],i)=>{const v=VEICULOS.find(x=>x.placa===placa);return`<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid #f9fafb"><span style="font-size:12px;font-weight:800;color:${i===0?'#f59e0b':i===1?'#94a3b8':'#9ca3af'};width:22px">${i+1}</span>${v?badgeTipo(v.tipo):''}<div style="flex:1;font-weight:700;font-size:12px;color:#111827">${placa}</div><span style="font-size:12px;font-weight:700;color:#374151">${fmt$(val)}</span></div>`;}).join('')}</div>`:''}
    ${filtered.map(m=>{const v=VEICULOS.find(x=>x.id===m.veiculo_id);return`<div class="card2" style="margin-bottom:8px;border-left:4px solid ${v&&isPesado(v.tipo)?'#7c3aed':'#2563eb'}"><div style="padding:12px 14px;display:flex;justify-content:space-between;gap:12px"><div style="flex:1;min-width:0"><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:3px"><span style="font-weight:700;font-size:13px">${m.veiculos?.placa||'—'}</span>${v?badgeTipo(v.tipo):''}<span style="background:#f1f5f9;color:#6b7280;font-size:10px;padding:2px 7px;border-radius:6px">${m.categoria||'—'}</span>${m.os_cc?`<span style="background:#eff6ff;color:#1e3a5f;font-size:10px;padding:2px 7px;border-radius:6px">OS:${m.os_cc}</span>`:''}</div><div style="font-size:12px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.descricao||''}</div><div style="font-size:11px;color:#9ca3af">${fmtD(m.data)}${m.nota_fiscal?' · '+m.nota_fiscal:''}</div></div><span style="font-weight:700;font-size:14px;color:#111827;flex-shrink:0">${fmt$(m.valor)}</span></div></div>`;}).join('')}
    ${filtered.length===0?'<p class="empty">Sem lançamentos no período</p>':''}`;
}

// ── DASHBOARDS ANALÍTICOS ────────────────────────────────
// DUP: let dashTab='manut',dashAno=new Date().getFullYear(),dashTipo='todos',dashPlaca='',dashDI='',dashDF='';
// DUP: const CORES=['#2563eb','#7c3aed','#16a34a','#d97706','#dc2626','#0891b2','#db2777','#65a30d','#ea580c','#8b5cf6'];
// DUP: const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function renderDashboards(){
  const el2=g('tab-dashboards');if(!el2)return;
  const placasU=[...new Set(MANUTENCOES.map(m=>m.veiculos?.placa).filter(Boolean))].sort();
  el2.innerHTML=`
    <div style="font-weight:700;font-size:16px;color:#111827;margin-bottom:12px">📊 Dashboards Analíticos</div>
    <div style="background:#fff;border-radius:13px;border:1px solid #e5e7eb;padding:14px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:8px">🔍 Filtros</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:4px">Data inicial</label><input type="date" value="${dashDI}" onchange="dashDI=this.value;renderDashBody()" style="width:100%;border:1.5px solid #e5e7eb;border-radius:9px;padding:8px;font-size:12px;outline:none;font-family:inherit"></div>
        <div><label style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:4px">Data final</label><input type="date" value="${dashDF}" onchange="dashDF=this.value;renderDashBody()" style="width:100%;border:1.5px solid #e5e7eb;border-radius:9px;padding:8px;font-size:12px;outline:none;font-family:inherit"></div>
      </div>
      ${!dashDI&&!dashDF?`<div style="margin-bottom:8px"><label style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:4px">Ano</label><select onchange="dashAno=+this.value;renderDashBody()" style="width:100%;border:1.5px solid #e5e7eb;border-radius:9px;padding:8px;font-size:12px;outline:none;background:#fff;font-family:inherit">${[2024,2025,2026,2027].map(y=>`<option value="${y}"${y===dashAno?' selected':''}>${y}</option>`).join('')}</select></div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <div><label style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:4px">Tipo veículo</label><select onchange="dashTipo=this.value;renderDashBody()" style="width:100%;border:1.5px solid #e5e7eb;border-radius:9px;padding:8px;font-size:12px;outline:none;background:#fff;font-family:inherit"><option value="todos">Todos</option><option value="leve" ${dashTipo==='leve'?'selected':''}>🚗 Leves</option><option value="pesado" ${dashTipo==='pesado'?'selected':''}>🚛 Pesados</option></select></div>
        <div><label style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:4px">Placa</label><select onchange="dashPlaca=this.value;renderDashBody()" style="width:100%;border:1.5px solid #e5e7eb;border-radius:9px;padding:8px;font-size:12px;outline:none;background:#fff;font-family:inherit"><option value="">Todas</option>${placasU.map(p=>`<option value="${p}"${p===dashPlaca?' selected':''}>${p}</option>`).join('')}</select></div>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px">
      ${[['manut','🔧 Manutenção'],['corret','⚠️ Corretivas'],['comb','⛽ Combustível'],['cats','📂 Categorias'],['mensal','📅 Fechamento']].map(([k,l])=>`<button onclick="dashTab='${k}';renderDashBody()" style="padding:7px 12px;font-size:12px;font-weight:${dashTab===k?700:500};border-radius:9px;border:1.5px solid ${dashTab===k?'#1e3a5f':'#e5e7eb'};background:${dashTab===k?'#eff6ff':'#fff'};color:${dashTab===k?'#1e3a5f':'#6b7280'};cursor:pointer;font-family:inherit;white-space:nowrap">${l}</button>`).join('')}
    </div>
    <div id="dash-body"></div>`;
  renderDashBody();
}
// ── WHATSAPP via link wa.me (sem cadastro) ──────────────
function abrirWhatsApp(telefone, mensagem) {
  if(!telefone) { toast('Telefone não cadastrado para este motorista','err'); return; }
  const phone = telefone.replace(/[\s\-\(\)\+]/g,'');
  const url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(mensagem);
  window.open(url, '_blank');
}
async function notificarMotoristaWA(motoristaId, mensagem) {
  const mot = MOTORISTAS.find(m => m.id === motoristaId);
  if(!mot) return false;
  // Tenta WhatsApp via link (sempre funciona, sem cadastro)
  if(mot.whatsapp || mot.telefone) {
    const fone = mot.whatsapp || mot.telefone;
    abrirWhatsApp(fone, mensagem);
    return true;
  }
  return false;
}
