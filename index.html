<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FleetControl</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f1f5f9}
.hidden{display:none!important}
/* Auth */
.auth{min-height:100vh;background:linear-gradient(135deg,#1e3a5f,#0f172a);display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:18px;padding:28px;width:100%;max-width:380px;box-shadow:0 20px 40px rgba(0,0,0,.3)}
.lbl{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px;margin-top:12px}
input,textarea,select{width:100%;border:1.5px solid #e5e7eb;border-radius:9px;padding:10px 12px;font-size:13px;outline:none;font-family:inherit;background:#fff}
textarea{resize:none;height:76px}
.btn-c{width:100%;padding:13px;background:#1e3a5f;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;font-family:inherit}
.btn-c:hover{background:#162d4a}
.btn-c:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:10px;padding:10px;border-radius:9px;font-size:13px;font-weight:500}
.msg-ok{background:#f0fdf4;color:#16a34a;border:1px solid #86efac}
.msg-err{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.msg-info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.hint{background:#f0fdf4;border:1px solid #86efac;border-radius:9px;padding:10px 13px;font-size:12px;color:#166534;margin-bottom:4px;line-height:1.6}
/* App */
.app-wrap{display:flex;min-height:100vh}
.sb{width:220px;background:#1e3a5f;position:fixed;top:0;left:0;bottom:0;z-index:50;display:flex;flex-direction:column;overflow-y:auto;transition:transform .25s}
.sb-hd{padding:14px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:8px}
.sb-hd img{height:30px;object-fit:contain;max-width:100px}
.sb-emp{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-tr{background:rgba(255,255,255,.15);border:none;border-radius:7px;color:#fff;cursor:pointer;padding:4px 8px;font-size:11px;font-family:inherit;flex-shrink:0;margin-left:auto}
.sb-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:12px 14px 3px;color:rgba(255,255,255,.4)}
.sb-body{flex:1;padding:4px 0}
.sb-ft{padding:4px 0 8px;border-top:1px solid rgba(255,255,255,.1)}
.ni{display:flex;align-items:center;gap:9px;padding:9px 12px;border:none;cursor:pointer;width:calc(100%-12px);margin:1px 6px;border-radius:9px;font-family:inherit;font-size:13px;font-weight:500;background:transparent;color:rgba(255,255,255,.72);text-align:left;width:calc(100% - 12px)}
.ni:hover,.ni.on{background:rgba(255,255,255,.18);color:#fff;font-weight:700}
.ni .ic{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.ni .lb{flex:1}
.ndot{width:7px;height:7px;border-radius:50%;background:#ef4444;flex-shrink:0}
.main{margin-left:220px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.content{padding:16px 20px;max-width:700px}
.mob-tog{display:none;position:fixed;top:10px;left:10px;z-index:60;background:#1e3a5f;border:none;border-radius:9px;padding:8px 10px;color:#fff;cursor:pointer;font-size:18px;line-height:1}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}
@media(max-width:680px){.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}.mob-tog{display:flex}.sb-ov.open{display:block}.main{margin-left:0}.topbar{padding-left:52px}.content{padding:12px}}
/* Company */
.emp-btn{width:100%;background:#fff;border:2px solid #e5e7eb;border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:12px;font-family:inherit;text-align:left}
.emp-btn:hover{border-color:#1e3a5f}
/* Content */
.badge{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:700;display:inline-block}
.be{background:#fef2f2;color:#dc2626}
.empty{text-align:center;color:#9ca3af;padding:40px;font-size:13px}
.card2{background:#fff;border-radius:13px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:10px}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:9999;padding:9px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 4px 18px rgba(0,0,0,.25);white-space:nowrap;pointer-events:none}
</style>
</head>

// ─── UTILS ────────────────────────────────────────────────
const g = id => document.getElementById(id);
const show = id => g(id) && g(id).classList.remove('hidden');
const hide = id => g(id) && g(id).classList.add('hidden');
const fmt$ = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtD = d => d ? new Date(d+'T12:00').toLocaleDateString('pt-BR') : '—';
const today = () => new Date().toISOString().split('T')[0];
const isPesado = t => ['Caminhão','Munck','Ônibus','Micro Ônibus','Van'].includes(t);

function toast(msg, type='ok') {
  const t = g('toast');
  if(!t) return;
  t.textContent = msg;
  t.style.background = {ok:'#16a34a',err:'#dc2626',info:'#2563eb'}[type]||'#374151';
  t.classList.remove('hidden');
  t.style.opacity = '1';
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.classList.add('hidden'),300); }, 3000);
}

function msg(id, text, type) {
  const el = g(id);
  if(!el) return;
  el.innerHTML = text ? `<div class="msg msg-${type||'info'}">${text}</div>` : '';
}

// ─── TEMA ─────────────────────────────────────────────────
function aplicarTema(empresa) {
  const isJ = empresa && empresa.nome && empresa.nome.toLowerCase().includes('jatear');
  const bg = isJ ? '#7f1d1d' : '#1e3a5f';
  const logoKey = isJ ? 'jatear' : 'enjatec';
  const sb = g('sidebar'); if(sb) sb.style.background = bg;
  const mt = g('mob-tog'); if(mt) mt.style.background = bg;
  const sl = g('sb-logo');
  if(sl) {
    sl.src = LOGOS[logoKey] || '';
    // Logos coloridas precisam de fundo claro no sidebar escuro
    // Usar versão branca: se não tiver, mostrar nome da empresa
    // As logos enviadas são azul/vermelho - usar fundo claro no sidebar
    sl.style.filter = 'brightness(0) invert(1)';  // inverte para branco no sidebar escuro
    sl.style.height = '30px';
    sl.style.objectFit = 'contain';
    sl.style.maxWidth = '120px';
    sl.style.display = 'block';
  }
  const se = g('sb-emp'); if(se) se.textContent = empresa ? empresa.nome : '';
}

// ─── NAV ──────────────────────────────────────────────────
function goTab(tab) {
  TABS.forEach(t => { const n=g('ni-'+t); if(n){n.classList.remove('on');} });
  const n = g('ni-'+tab); if(n) n.classList.add('on');
  TAB = tab;
  // Fechar sidebar no mobile
  g('sidebar')?.classList.remove('open');
  g('sb-ov')?.classList.remove('open');
  // Atualizar título
  const tt = g('top-title'); if(tt) tt.textContent = TITULOS[tab]||'FleetControl';
  // Renderizar
  renderTab(tab);
}

function renderTab(tab) {
  const c = g('ct'); if(!c) return;
  c.innerHTML = `<div id="tab-${tab}"></div>`;
  // Dispatcher
  const fns = {
    dashboard: renderDashboard, veiculos: renderVeiculos,
    manutencao: renderManutencao, abastec: renderAbastecimento,
    pneus: renderPneus, baterias: renderBaterias, arcond: renderArcond,
    multas: renderMultas, documentacao: renderDocumentacao,
    oscc: renderOSCC, fornecedores: renderFornecedores,
    diverso: renderDiversos, dashboards: renderDashboards,
    relatorio: renderRelatorio, motoristas: renderMotoristas
  };
  if(fns[tab]) try { fns[tab](); } catch(e) { c.innerHTML = `<p class="empty">Erro ao carregar: ${e.message}</p>`; console.error(tab, e); }
}

// ─── DADOS ────────────────────────────────────────────────
async function loadData() {
  if(!SB || !EMPRESA) return;
  const eid = EMPRESA.id;
  try {
    const [v,m,f,a,b,p,ac,mot,mul,con,doc,occ] = await Promise.all([
      SB.from('veiculos').select('*').eq('empresa_id',eid).order('placa'),
      SB.from('manutencoes').select('*,veiculos(placa,modelo,tipo)').eq('empresa_id',eid).order('data',{ascending:false}).limit(500),
      SB.from('fornecedores').select('*').eq('empresa_id',eid).order('nome'),
      SB.from('abastecimentos').select('*,veiculos(placa,tipo)').eq('empresa_id',eid).order('data',{ascending:false}).limit(500),
      SB.from('baterias').select('*,veiculos(placa,tipo)').eq('empresa_id',eid).order('created_at',{ascending:false}),
      SB.from('pneus').select('*,veiculos(placa,tipo)').eq('empresa_id',eid).order('created_at',{ascending:false}),
      SB.from('ar_condicionado').select('*,veiculos(placa,tipo)').eq('empresa_id',eid).order('data_servico',{ascending:false}),
      SB.from('motoristas').select('*').eq('empresa_id',eid).order('nome'),
      SB.from('multas').select('*,veiculos(placa),motoristas(nome)').eq('empresa_id',eid).order('data_infracao',{ascending:false}),
      SB.from('consultas_nada_consta').select('*,veiculos(placa),motoristas(nome)').eq('empresa_id',eid).order('data_consulta',{ascending:false}),
      SB.from('documentacao_veicular').select('*,veiculos(placa)').eq('empresa_id',eid).order('data_vencimento',{ascending:true}),
      SB.from('os_cc_cadastros').select('*').eq('empresa_id',eid).order('codigo'),
      SB.from('agenda_veiculos').select('*,veiculos(placa,tipo),motoristas!agenda_veiculos_motorista_id_fkey(nome,email),responsavel:motoristas!agenda_veiculos_motorista_responsavel_id_fkey(nome,email)').eq('empresa_id',eid).order('data',{ascending:true}),
    ]);
    if(v.data) VEICULOS=v.data; if(m.data) MANUTENCOES=m.data;
    if(f.data) FORNECEDORES=f.data; if(a.data) ABASTECIMENTOS=a.data;
    if(b.data) BATERIAS=b.data; if(p.data) PNEUS=p.data;
    if(ac.data) ARCOND=ac.data; if(mot.data) MOTORISTAS=mot.data;
    if(mul.data) MULTAS=mul.data; if(con.data) CONSULTAS=con.data;
    if(doc.data) DOCUMENTACAO=doc.data; if(occ.data) OSCC_CADS=occ.data;
    updateBadge();
  } catch(e) { console.error('loadData:', e); toast('Erro ao carregar dados','err'); }
}

function updateBadge() {
  const alertaV = v => { if(!v.km_ultima_manut && !v.data_ultima_manut) return 'OK'; if(v.km_atual&&v.km_ultima_manut&&v.intervalo_km&&(v.km_ultima_manut+v.intervalo_km)-v.km_atual<=0) return 'VENCIDO'; return 'OK'; };
  const n = VEICULOS.filter(v=>alertaV(v)==='VENCIDO').length;
  const b=g('a-badge'),d=g('a-dot');
  if(n>0){if(b){b.textContent=n+' alerta'+(n>1?'s':'');b.classList.remove('hidden');}if(d)d.classList.remove('hidden');}
  else{b?.classList.add('hidden');d?.classList.add('hidden');}
}

async function doSync() { await loadData(); renderTab(TAB); toast('Sincronizado!'); }

// ─── AUTH ─────────────────────────────────────────────────
async function doConectar() {
  const key = (g('cfg-key')?.value || '').trim();
  const btn = g('cfg-btn');
  if(!key || key.length < 30) { msg('cfg-msg','❌ Cole a chave eyJ... no campo acima','err'); return; }
  btn.disabled = true;
  btn.textContent = 'Conectando...';
  msg('cfg-msg','⏳ Verificando conexão...','info');
  try {
    const client = supabase.createClient(SB_URL, key);
    const { error } = await client.from('empresas').select('id').limit(1);
    if(error) throw error;
    SB = client;
    localStorage.setItem('fc_url', SB_URL);
    localStorage.setItem('fc_key', key);
    msg('cfg-msg','✅ Conectado com sucesso!','ok');
    const { data: { session } } = await SB.auth.getSession();
    setTimeout(() => session?.user ? showEmpresas() : showLogin(), 600);
  } catch(e) {
    msg('cfg-msg','❌ ' + (e.message || 'Verifique a chave eyJ...'),'err');
    btn.disabled = false;
    btn.textContent = 'Conectar →';
  }
}

function showLogin() {
  hide('s-config'); hide('s-company'); hide('s-app'); show('s-login');
  msg('lmsg','','');
}

function toggleMode() {
  MODE = MODE==='login' ? 'signup' : 'login';
  g('login-sub').textContent = MODE==='login' ? 'Entre na sua conta' : 'Criar nova conta';
  g('lbtn').textContent = MODE==='login' ? 'Entrar →' : 'Criar conta';
  g('ltog').textContent = MODE==='login' ? 'Ainda não tenho conta →' : '← Já tenho conta';
  MODE==='signup' ? show('ln-wrap') : hide('ln-wrap');
  msg('lmsg','','');
}

async function doLogin() {
  const email = (g('le')?.value||'').trim();
  const pass  = g('lp')?.value||'';
  if(!email||!pass) { msg('lmsg','❌ Preencha e-mail e senha','err'); return; }
  if(pass.length<6) { msg('lmsg','❌ Senha mínima: 6 caracteres','err'); return; }
  g('lbtn').disabled=true; g('lbtn').textContent='Aguarde...';
  msg('lmsg','⏳ Processando...','info');
  try {
    if(MODE==='signup') {
      const nome = (g('ln')?.value||'').trim();
      const {error} = await SB.auth.signUp({email, password:pass, options:{data:{nome}}});
      if(error) throw error;
      const {error:e2} = await SB.auth.signInWithPassword({email, password:pass});
      if(e2) { msg('lmsg','✅ Conta criada! Faça login.','ok'); g('lbtn').disabled=false; g('lbtn').textContent='Entrar →'; MODE='login'; g('login-sub').textContent='Entre na sua conta'; return; }
    } else {
      const {error} = await SB.auth.signInWithPassword({email, password:pass});
      if(error) throw error;
    }
    await showEmpresas();
  } catch(e) {
    msg('lmsg','❌ '+e.message,'err');
    g('lbtn').disabled=false;
    g('lbtn').textContent = MODE==='login'?'Entrar →':'Criar conta';
  }
}

async function doSelect(id, nome, cor) {
  EMPRESA = {id, nome, cor};
  aplicarTema(EMPRESA);
  hide('s-company'); show('s-app');
  if(window.innerWidth > 680) { const m=g('main'); if(m) m.style.marginLeft='220px'; }
  await loadData();
  goTab('dashboard');
}

function doVoltarEmpresas() {
  hide('s-app');
  const m=g('main'); if(m) m.style.marginLeft='0';
  showEmpresas();
}

async function doLogout() {
  if(SB) await SB.auth.signOut();
  SB=null; EMPRESA=null;
  VEICULOS=[]; MANUTENCOES=[]; FORNECEDORES=[]; ABASTECIMENTOS=[];
  BATERIAS=[]; PNEUS=[]; ARCOND=[]; MOTORISTAS=[]; MULTAS=[];
  CONSULTAS=[]; DOCUMENTACAO=[]; OSCC_CADS=[];
  localStorage.removeItem('fc_url'); localStorage.removeItem('fc_key');
  hide('s-app'); show('s-config');
  if(g('cfg-key')) g('cfg-key').value='';
  msg('cfg-msg','','');
}

// Helpers
const badgeTipo=t=>isPesado(t)?'<span class="badge" style="background:#fdf4ff;color:#7c3aed">PESADO</span>':'<span class="badge" style="background:#eff6ff;color:#2563eb">LEVE</span>';
const badgeAlerta=s=>({VENCIDO:'<span class="badge be">VENCIDO</span>',ATENÇÃO:'<span class="badge" style="background:#fffbeb;color:#d97706">ATENÇÃO</span>',OK:'<span class="badge" style="background:#f0fdf4;color:#16a34a">OK</span>'}[s]||'');
function alertaV(v){if(v.tipo==='Munck')return{s:'OK',msg:''};let venc=false,aten=false,msgs=[];if(v.km_atual&&v.km_ultima_manut&&v.intervalo_km){const f=(v.km_ultima_manut+v.intervalo_km)-v.km_atual;if(f<=0){venc=true;msgs.push('KM: '+Math.abs(f).toLocaleString('pt-BR')+'km atraso');}else if(f<=v.intervalo_km*0.2){aten=true;msgs.push('KM: faltam '+f.toLocaleString('pt-BR')+'km');}}if(v.data_ultima_manut&&v.intervalo_dias){const dias=Math.floor((Date.now()-new Date(v.data_ultima_manut))/86400000);const f=v.intervalo_dias-dias;if(f<=0){venc=true;msgs.push('Data: '+Math.abs(f)+'d atraso');}else if(f<=v.intervalo_dias*0.2){aten=true;msgs.push('Data: faltam '+f+'d');}}return{s:venc?'VENCIDO':aten?'ATENÇÃO':'OK',msg:msgs.join(' · ')};}
function alertaB(b){if(!b.data_instalacao||!b.garantia_meses)return{s:'OK',msg:''};const venc=new Date(b.data_instalacao);venc.setMonth(venc.getMonth()+b.garantia_meses);const dias=Math.floor((venc-new Date())/86400000);if(dias<=0)return{s:'VENCIDA',msg:'Vencida há '+Math.abs(dias)+'d'};if(dias<=30)return{s:'ATENÇÃO',msg:'Vence em '+dias+'d'};return{s:'OK',msg:''}}
function sopts(opts,val='',ph=''){let s=ph?`<option value="">${ph}</option>`:'';opts.forEach(o=>{if(typeof o==='string')s+=`<option value="${o}"${o===val?' selected':''}>${o}</option>`;else s+=`<option value="${o.v}"${o.v===val?' selected':''}>${o.l}</option>`;});return s;}
function osOpts(val=''){return sopts([{v:'',l:'— Selecione OS/CC —'},...OSCC_CADS.map(o=>({v:o.codigo,l:`OS ${o.codigo} — ${o.descricao}`}))],val);}

async function salvarKM(vid,atual){
  const novo=parseInt(g('km-novo')?.value)||0;
  if(!novo||novo<=atual){if(g('km-err'))g('km-err').textContent='O novo KM deve ser maior que o atual';return;}
  await SB.from('km_updates').insert({veiculo_id:vid,empresa_id:EMPRESA.id,data:today(),km_anterior:atual,km_novo:novo});
  await SB.from('veiculos').update({km_atual:novo,updated_at:new Date().toISOString()}).eq('id',vid);
  await loadData();closeModal();renderVeiculos();toast('KM atualizado!');
}

function filtrarDash(lista,campoData='data'){
// DUP-SKIP:   const vF=dashTipo==='leve'?VEICULOS.filter(v=>!isPesado(v.tipo)).map(v=>v.id):dashTipo==='pesado'?VEICULOS.filter(v=>isPesado(v.tipo)).map(v=>v.id):null;
  return lista.filter(item=>{
    if(!item[campoData])return false;
    const d=item[campoData].toString().substring(0,10);
    if(dashDI||dashDF){if(dashDI&&d<dashDI)return false;if(dashDF&&d>dashDF)return false;}
    else{if(new Date(d+'T12:00').getFullYear()!==dashAno)return false;}
    if(vF&&!vF.includes(item.veiculo_id))return false;
    if(dashPlaca&&(item.veiculos?.placa||'')!==dashPlaca)return false;
    return true;
  });
}

// CORES=['#2563eb','#7c3aed','#16a34a','#d97706','#dc2626','#0891b2','#db2777','#65a30d','#ea580c','#8b5cf6'];
function renderDashBody(){
  Object.keys(_ch).forEach(k=>dch(k));

function dashManut(c,dados){
  const porMes=Array(12).fill(0);dados.forEach(m=>{porMes[new Date(m.data+'T12:00').getMonth()]+=(m.valor||0);});
  const total=porMes.reduce((s,v)=>s+v,0);
  const porV={};dados.forEach(m=>{const p=m.veiculos?.placa||'—';if(!porV[p])porV[p]={t:0,n:0,tipo:VEICULOS.find(v=>v.placa===p)?.tipo||''};porV[p].t+=(m.valor||0);porV[p].n++;});
  const rank=Object.entries(porV).sort((a,b)=>b[1].t-a[1].t).slice(0,8);
  c.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"><div class="kpi2"><div class="kn2" style="font-size:15px">${fmt$(total)}</div><div class="kl2">Total período</div></div><div class="kpi2"><div class="kn2" style="font-size:15px">${fmt$(total/12)}</div><div class="kl2">Média mensal</div></div></div>
  <div class="card2" style="margin-bottom:12px"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">📈 Gasto mensal</div><div style="padding:12px"><div style="position:relative;height:180px"><canvas id="ch-dm2"></canvas></div></div></div>
  <div class="card2"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">🏆 Ranking por veículo</div>
  ${rank.map(([p,d],i)=>{const pct=total?Math.round(d.t/total*100):0;return`<div style="padding:9px 14px;border-bottom:1px solid #f9fafb"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="display:flex;gap:6px;align-items:center"><span style="font-size:11px;font-weight:800;color:#9ca3af;width:18px">${i+1}</span>${d.tipo?badgeTipo(d.tipo):''}<span style="font-weight:700;font-size:12px;color:#111827">${p}</span><span style="font-size:10px;color:#9ca3af">${d.n} ev.</span></div><span style="font-size:12px;font-weight:700;color:#374151">${fmt$(d.t)} <span style="color:#9ca3af;font-weight:400">(${pct}%)</span></span></div><div style="height:6px;background:#f1f5f9;border-radius:999px;overflow:hidden"><div style="height:100%;border-radius:999px;background:${isPesado(d.tipo)?'#7c3aed':'#2563eb'};width:${pct}%"></div></div></div>`;}).join('')}
  ${rank.length===0?'<p class="empty">Sem dados</p>':''}</div>`;
  setTimeout(()=>{const ctx=document.getElementById('ch-dm2');if(!ctx)return;_ch['dm2']=new Chart(ctx,{type:'bar',data:{labels:MESES,datasets:[{label:'R$',data:porMes,backgroundColor:dashTipo==='pesado'?'#7c3aed':'#2563eb',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt$(c.raw)}}},scales:{y:{ticks:{callback:v=>fmt$(v)}}}}});},100);
}

function dashCorret(c,dados){
  const corr=dados.filter(m=>m.tipo==='Corretiva');
  const prev=dados.filter(m=>m.tipo==='Preventiva');
  const outr=dados.filter(m=>m.tipo!=='Corretiva'&&m.tipo!=='Preventiva');
  const tC=corr.reduce((s,m)=>s+(m.valor||0),0),tP=prev.reduce((s,m)=>s+(m.valor||0),0),tO=outr.reduce((s,m)=>s+(m.valor||0),0);
  const tG=tC+tP+tO||1;
  const pC=Math.round(tC/tG*100),pP=Math.round(tP/tG*100),pO=100-pC-pP;
  const porV={};corr.forEach(m=>{const p=m.veiculos?.placa||'—';if(!porV[p])porV[p]={n:0,t:0,tipo:VEICULOS.find(v=>v.placa===p)?.tipo||''};porV[p].n++;porV[p].t+=(m.valor||0);});
  const rank=Object.entries(porV).sort((a,b)=>b[1].n-a[1].n).slice(0,8);
  const maxN=rank[0]?.[1].n||1;
  c.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
    <div class="kpi2"><div class="kn2">${corr.length}</div><div class="kl2">Corretivas</div></div>
    <div class="kpi2"><div class="kn2" style="color:#dc2626">${pC}%</div><div class="kl2">Do total</div></div>
    <div class="kpi2"><div class="kn2" style="color:#16a34a">${pP}%</div><div class="kl2">Preventivas</div></div>
  </div>
  <div class="card2" style="margin-bottom:12px"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">📊 Preventiva vs Corretiva</div>
  <div style="padding:12px;display:flex;align-items:center;gap:12px">
    <div style="width:150px;flex-shrink:0"><canvas id="ch-pc" style="max-width:150px;max-height:150px"></canvas></div>
    <div style="flex:1">${[['Preventiva',pP,tP,'#16a34a'],['Corretiva',pC,tC,'#dc2626'],['Outros',pO,tO,'#d97706']].map(([n,p,v,cor])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:600;color:#374151">${n}</span><span style="font-size:11px;font-weight:700;color:${cor}">${p}% — ${fmt$(v)}</span></div><div style="height:6px;background:#f1f5f9;border-radius:999px;overflow:hidden"><div style="height:100%;border-radius:999px;background:${cor};width:${p}%"></div></div></div>`).join('')}</div>
  </div></div>
  <div class="card2"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">⚠️ Mais corretivas</div>
  ${rank.map(([p,d],i)=>`<div style="padding:9px 14px;border-bottom:1px solid #f9fafb"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="display:flex;gap:6px;align-items:center"><span style="font-size:11px;font-weight:800;color:#9ca3af;width:18px">${i+1}</span>${d.tipo?badgeTipo(d.tipo):''}<span style="font-weight:700;font-size:12px;color:#111827">${p}</span></div><span style="font-size:12px;color:#374151"><b>${d.n}</b> ocorr. · ${fmt$(d.t)}</span></div><div style="height:6px;background:#f1f5f9;border-radius:999px;overflow:hidden"><div style="height:100%;border-radius:999px;background:#dc2626;width:${Math.round(d.n/maxN*100)}%"></div></div></div>`).join('')}
  ${rank.length===0?'<p class="empty">Sem corretivas</p>':''}</div>`;
  setTimeout(()=>{const ctx=document.getElementById('ch-pc');if(!ctx)return;_ch['pc']=new Chart(ctx,{type:'doughnut',data:{labels:['Preventiva '+pP+'%','Corretiva '+pC+'%','Outros '+pO+'%'],datasets:[{data:[tP,tC,tO],backgroundColor:['#16a34a','#dc2626','#d97706'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}}}});},100);
}

function dashComb(c,dados){
  const porMes=Array(12).fill(0);const litrosMes=Array(12).fill(0);
  dados.forEach(a=>{const mes=new Date(a.data+'T12:00').getMonth();porMes[mes]+=(a.valor_total||0);litrosMes[mes]+=(a.litros||0);});
  const total=porMes.reduce((s,v)=>s+v,0),totalL=litrosMes.reduce((s,v)=>s+v,0);
  const porV={};dados.forEach(a=>{const p=a.veiculos?.placa||'—';if(!porV[p])porV[p]={t:0,l:0,tipo:VEICULOS.find(v=>v.placa===p)?.tipo||''};porV[p].t+=(a.valor_total||0);porV[p].l+=(a.litros||0);});
  const rank=Object.entries(porV).sort((a,b)=>b[1].t-a[1].t).slice(0,8);
  c.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"><div class="kpi2"><div class="kn2" style="font-size:15px">${fmt$(total)}</div><div class="kl2">Total gasto</div></div><div class="kpi2"><div class="kn2" style="font-size:15px">${totalL.toFixed(0)}L</div><div class="kl2">Total litros</div></div></div>
  <div class="card2" style="margin-bottom:12px"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">⛽ Consumo mensal (R$ + Litros)</div><div style="padding:12px"><div style="position:relative;height:200px"><canvas id="ch-cb"></canvas></div></div></div>
  <div class="card2"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">🏆 Ranking por consumo</div>
  ${rank.map(([p,d],i)=>{const pct=total?Math.round(d.t/total*100):0;return`<div style="padding:9px 14px;border-bottom:1px solid #f9fafb"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="display:flex;gap:6px;align-items:center"><span style="font-size:11px;font-weight:800;color:#9ca3af;width:18px">${i+1}</span>${d.tipo?badgeTipo(d.tipo):''}<span style="font-weight:700;font-size:12px;color:#111827">${p}</span></div><span style="font-size:11px;color:#374151">${d.l.toFixed(0)}L · <b>${fmt$(d.t)}</b> (${pct}%)</span></div><div style="height:6px;background:#f1f5f9;border-radius:999px;overflow:hidden"><div style="height:100%;border-radius:999px;background:#16a34a;width:${pct}%"></div></div></div>`;}).join('')}
  ${rank.length===0?'<p class="empty">Sem dados</p>':''}</div>`;
  setTimeout(()=>{const ctx=document.getElementById('ch-cb');if(!ctx)return;_ch['cb']=new Chart(ctx,{type:'bar',data:{labels:MESES,datasets:[{type:'bar',label:'Litros (L)',data:litrosMes,backgroundColor:'rgba(22,163,74,.25)',yAxisID:'y2',order:2},{type:'line',label:'Gasto (R$)',data:porMes,borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,.1)',tension:.3,fill:false,yAxisID:'y1',order:1,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}},scales:{y1:{position:'left',ticks:{callback:v=>fmt$(v)}},y2:{position:'right',grid:{drawOnChartArea:false},ticks:{callback:v=>v.toFixed(0)+'L'}}}}});},100);
}

function dashCats(c,dados){
  const porCat={};dados.forEach(m=>{const cat=m.categoria||'Outros';if(!porCat[cat])porCat[cat]={t:0,n:0};porCat[cat].t+=(m.valor||0);porCat[cat].n++;});
  const sorted=Object.entries(porCat).sort((a,b)=>b[1].t-a[1].t);
  const total=sorted.reduce((s,[,d])=>s+d.t,0);
  c.innerHTML=`<div class="card2" style="margin-bottom:12px"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">📂 Custo por categoria</div><div style="padding:12px"><div style="position:relative;height:240px"><canvas id="ch-cat"></canvas></div></div></div>
  <div class="card2"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">💰 Índice de custo</div>
  ${sorted.map(([cat,d],i)=>{const pct=total?Math.round(d.t/total*100):0;return`<div style="padding:9px 14px;border-bottom:1px solid #f9fafb"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:600;color:#374151">${cat}</span><span style="font-size:11px;color:#6b7280">${pct}% · ${fmt$(d.t)} · ${d.n} ev.</span></div><div style="height:6px;background:#f1f5f9;border-radius:999px;overflow:hidden"><div style="height:100%;border-radius:999px;background:${CORES[i%CORES.length]};width:${pct}%"></div></div></div>`;}).join('')}
  ${sorted.length===0?'<p class="empty">Sem dados</p>':''}</div>`;
  setTimeout(()=>{const ctx=document.getElementById('ch-cat');if(!ctx)return;const top=sorted.slice(0,8);_ch['cat']=new Chart(ctx,{type:'bar',data:{labels:top.map(([c])=>c.length>16?c.substring(0,16)+'…':c),datasets:[{data:top.map(([,d])=>d.t),backgroundColor:CORES.slice(0,top.length),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>fmt$(v)}}}}});},100);
}

function dashMensal(c,dados){
  const res=MESES.map((mes,i)=>{const mD=dados.filter(m=>new Date(m.data+'T12:00').getMonth()===i);const t=mD.reduce((s,m)=>s+(m.valor||0),0);const cats={};mD.forEach(m=>{const tp=m.tipo||'Outros';if(!cats[tp])cats[tp]=0;cats[tp]+=(m.valor||0);});return{mes,t,cats,n:mD.length};});
  const tipos=[...new Set(dados.map(m=>m.tipo).filter(Boolean))];
  const totalAnual=res.reduce((s,r)=>s+r.t,0);
  c.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"><div class="kpi2"><div class="kn2" style="font-size:15px">${fmt$(totalAnual)}</div><div class="kl2">Total anual</div></div><div class="kpi2"><div class="kn2">${dados.length}</div><div class="kl2">Lançamentos</div></div></div>
  <div class="card2" style="margin-bottom:12px"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">📅 Fechamento mensal</div><div style="padding:12px"><div style="position:relative;height:220px"><canvas id="ch-men"></canvas></div></div></div>
  <div class="card2"><div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">% por tipo / mês</div>
  <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px"><tr style="background:#f8fafc"><th style="padding:7px 12px;text-align:left;font-weight:700;color:#6b7280">MÊS</th>${tipos.map(t=>`<th style="padding:7px 8px;text-align:center;font-weight:700;color:#6b7280">${t}</th>`).join('')}<th style="padding:7px 12px;text-align:right;font-weight:700;color:#6b7280">TOTAL</th></tr>${res.filter(r=>r.n>0).map(r=>`<tr style="border-bottom:1px solid #f1f5f9"><td style="padding:7px 12px;font-weight:600;color:#374151">${r.mes}</td>${tipos.map(t=>{const v=r.cats[t]||0;const pct=r.t?Math.round(v/r.t*100):0;return`<td style="padding:7px 8px;text-align:center;color:${pct>0?'#374151':'#d1d5db'}">${pct>0?pct+'%':'—'}</td>`;}).join('')}<td style="padding:7px 12px;text-align:right;font-weight:700;color:#111827">${fmt$(r.t)}</td></tr>`).join('')}</table></div></div>`;
  setTimeout(()=>{const ctx=document.getElementById('ch-men');if(!ctx)return;const ds=tipos.map((t,i)=>({label:t,data:res.map(r=>r.cats[t]||0),backgroundColor:CORES[i%CORES.length],borderRadius:3,stack:'s'}));_ch['men']=new Chart(ctx,{type:'bar',data:{labels:MESES,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}},scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>fmt$(v)}}}}});},100);
}

function initEmailJS() {

let agSemOff = 0;
const DIAS_S = ['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];
const MESES_A = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const COR_STATUS = {'Disponível':'#16a34a','Agendado':'#2563eb','Em Manutenção':'#dc2626','Aguardando Manutenção':'#d97706','Em Viagem':'#7c3aed'};

function getSemana(off) {
  const hoje = new Date();
  const dow = hoje.getDay();
  const seg = new Date(hoje);
  seg.setDate(hoje.getDate() - (dow === 0 ? 6 : dow - 1) + off * 7);
  return Array.from({length:7}, (_,i) => { const d = new Date(seg); d.setDate(seg.getDate()+i); return d; });
}

function isoDate(d) { return d.toISOString().split('T')[0]; }

function renderAgenda() {
  const el2 = g('tab-agenda'); if(!el2) return;
  const dias = getSemana(agSemOff);
  const hoje = isoDate(new Date());
  const iniS = isoDate(dias[0]), fimS = isoDate(dias[6]);
  const agS  = AGENDA.filter(a => a.data >= iniS && a.data <= fimS);

  // KPIs de status
  const stCounts = ['Disponível','Agendado','Em Manutenção','Aguardando Manutenção','Em Viagem']
    .map(s => ({s, n: VEICULOS.filter(v=>(v.status_operacional||'Disponível')===s).length}));

  el2.innerHTML = `
    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px">
      ${stCounts.map(({s,n})=>{
        const cor = {'Disponível':'#16a34a','Agendado':'#2563eb','Em Manutenção':'#dc2626','Aguardando Manutenção':'#d97706','Em Viagem':'#7c3aed'}[s]||'#6b7280';
        const label = s==='Aguardando Manutenção'?'Aguardando':s==='Em Manutenção'?'Manutenção':s==='Em Viagem'?'Em Viagem':s;
        return `<div style="background:${cor}15;border:1px solid ${cor}30;border-radius:9px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:${cor}">${n}</div><div style="font-size:9px;color:${cor};margin-top:1px">${label}</div></div>`;
      }).join('')}
    </div>

    <!-- Navegação semanal -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button onclick="agSemOff--;renderAgenda()" style="background:#fff;border:1px solid #e5e7eb;border-radius:9px;padding:7px 14px;font-size:14px;cursor:pointer;font-family:inherit">←</button>
      <div style="text-align:center">
        <div style="font-weight:700;font-size:14px;color:#111827">
          ${dias[0].getDate()} ${MESES_A[dias[0].getMonth()]} — ${dias[6].getDate()} ${MESES_A[dias[6].getMonth()]} ${dias[0].getFullYear()}
        </div>
        ${agSemOff===0?'<div style="font-size:11px;color:#2563eb;font-weight:600">Semana atual</div>':''}
      </div>

    </div>
    ${agSemOff!==0?`<div style="text-align:center;margin-bottom:8px"><button onclick="agSemOff=0;renderAgenda()" style="background:transparent;border:none;color:#2563eb;font-size:12px;cursor:pointer;font-family:inherit">↩ Semana atual</button></div>`:''}

    <!-- Grade semanal -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px">
      ${dias.map((d,i) => {
        const iso = isoDate(d);
        const isHj = iso === hoje;
        const evs = agS.filter(a => a.data === iso);
        const corDia = {'Manutenção':'#dc2626','Programação de Viagem':'#2563eb','Frete':'#16a34a'}; 
        return `<div style="background:${isHj?'#eff6ff':'#f8fafc'};border:${isHj?'2px solid #2563eb':'1px solid #e5e7eb'};border-radius:9px;padding:4px 3px;min-height:90px">
          <div style="font-size:8px;font-weight:700;color:${isHj?'#2563eb':'#9ca3af'};text-align:center">${DIAS_S[i]}</div>
          <div style="font-size:13px;font-weight:700;color:${isHj?'#2563eb':'#111827'};text-align:center;margin:2px 0">${d.getDate()}</div>
          ${evs.map(ev => {
            const cor = corDia[ev.categoria] || '#6b7280';
            const mot = MOTORISTAS.find(m=>m.id===(ev.motorista_id||ev.motorista_responsavel_id));
            const pNome = mot?.nome?.split(' ')[0]||'';
            const catLabel = ev.categoria==='Programação de Viagem'?'Viagem':ev.categoria==='Manutenção'?'Manut.':'Frete';
            return `<div style="background:${cor}15;border-left:2px solid ${cor};border-radius:0 4px 4px 0;padding:3px 4px;font-size:8px;margin-top:3px;cursor:pointer" onclick="verAgenda('${ev.id}')">
              <div style="font-weight:700;color:${cor}">${ev.veiculos?.placa||'—'}</div>
              ${pNome?`<div style="color:${cor};opacity:.8">${pNome}</div>`:''}
              <div style="color:#6b7280;font-size:7px">${catLabel}</div>
              ${ev.observacoes?`<div style="color:#9ca3af;font-size:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.observacoes}</div>`:''}
            </div>`;
          }).join('')}
          <button onclick="formAgenda(null,'${iso}')" style="width:100%;margin-top:3px;background:transparent;border:1px dashed #d1d5db;border-radius:4px;color:#9ca3af;cursor:pointer;font-size:10px;padding:2px;font-family:inherit">+</button>
        </div>`;
      }).join('')}
    </div>

    <!-- Legenda -->
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      ${[['#dc2626','🔧 Manutenção'],['#2563eb','🚗 Viagem'],['#16a34a','🚚 Frete']].map(([c,l])=>`
      <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;background:${c}15;border-left:2px solid ${c};border-radius:1px"></div><span style="font-size:11px;color:#6b7280">${l}</span></div>`).join('')}
    </div>

    <!-- Botões de novo agendamento -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <button onclick="formAgenda('Manutenção')" style="padding:10px 6px;background:#dc2626;color:#fff;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;line-height:1.3">🔧 Agendar<br>Manutenção</button>
      <button onclick="formAgenda('Viagem')" style="padding:10px 6px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;line-height:1.3">🚗 Programar<br>Viagem</button>
      <button onclick="formAgenda('Frete')" style="padding:10px 6px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;line-height:1.3">🚚 Agendar<br>Frete</button>
    </div>

    <!-- Lista próximos agendamentos -->
    <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:8px">📋 Próximos agendamentos</div>
    ${AGENDA.filter(a=>a.data>=hoje&&!['Cancelado','Concluído'].includes(a.status)).slice(0,10).map(a=>{
      const v = VEICULOS.find(x=>x.id===a.veiculo_id);
      const isM = a.categoria==='Manutenção', isF = a.categoria==='Frete';
      const cor = isM?'#dc2626':isF?'#16a34a':'#2563eb';
      const mot = MOTORISTAS.find(m=>m.id===a.motorista_id);
      const resp = MOTORISTAS.find(m=>m.id===a.motorista_responsavel_id);
      const sc = {Agendado:'#d97706',Confirmado:'#16a34a',Recusado:'#dc2626'}[a.status]||'#d97706';
      return `<div class="card2" style="margin-bottom:8px;border-left:4px solid ${cor}">
        <div style="padding:11px 14px;display:flex;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:4px">

              <span style="background:${cor}20;color:${cor};font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700">${a.categoria==='Programação de Viagem'?'Viagem':a.categoria}</span>
              <span style="background:${sc}20;color:${sc};font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600">${a.status}</span>
              ${a.os_cc?`<span style="background:#eff6ff;color:#1e3a5f;font-size:10px;padding:2px 7px;border-radius:6px">OS:${a.os_cc}</span>`:''}
            </div>
            <div style="font-size:12px;color:#374151">📅 ${fmtD(a.data)}${a.hora?' às '+a.hora:''}</div>
            ${isM?`<div style="font-size:11px;color:#6b7280">🔧 ${a.fornecedor_nome||'—'}${a.endereco_fornecedor?' · '+a.endereco_fornecedor:''}</div>
            <div style="font-size:11px;color:#6b7280">👤 Resp.: ${resp?.nome||'—'}</div>`:
            `<div style="font-size:11px;color:#6b7280">${isF?'🚚':'🚗'} ${a.destino||'—'} · ${mot?.nome||'—'}</div>`}
            ${a.observacoes?`<div style="font-size:11px;color:#9ca3af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.observacoes}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
            <button onclick="verAgenda('${a.id}')" style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;color:#2563eb;cursor:pointer;padding:5px 8px;font-size:11px;font-family:inherit">ver</button>
            <button onclick="formAgenda(null,null,'${a.id}')" style="background:transparent;border:none;cursor:pointer;font-size:15px;padding:2px">✏️</button>
          </div>

    }).join('')}
    ${AGENDA.filter(a=>a.data>=isoDate(new Date())&&!['Cancelado','Concluído'].includes(a.status)).length===0?'<p class="empty">Nenhum agendamento futuro</p>':''}
  `;

function verAgenda(aid) {
  const a = AGENDA.find(x=>x.id===aid); if(!a) return;
  const v = VEICULOS.find(x=>x.id===a.veiculo_id);
  const isM = a.categoria==='Manutenção';
  const mot = MOTORISTAS.find(m=>m.id===a.motorista_id);

async function salvarAgCompleto(tipo, editId) {
  const vid=g('ag-v')?.value, data=g('ag-dt')?.value;
  if(!vid||!data){toast('Veículo e data obrigatórios','err');return;}
  const isM = tipo==='Manutenção', isF = tipo==='Frete';
  
  // Validações específicas por categoria
  if(isM){
    const forn=g('ag-forn')?.value, resp=g('ag-resp')?.value;
    if(!forn){toast('Selecione a oficina','err');return;}
    if(!resp){toast('Selecione o motorista responsável','err');return;}
  } else {
    const mot=g('ag-mot')?.value, dest=g('ag-dest')?.value;
    if(!mot){toast('Selecione o motorista','err');return;}
    if(!dest){toast('Informe o destino','err');return;}
  }

  const d = {
    empresa_id: EMPRESA.id,
    veiculo_id: vid,
    data, hora: g('ag-hr')?.value||null,
    categoria: isM?'Manutenção':isF?'Frete':'Programação de Viagem',
    fornecedor_nome:   isM?g('ag-forn')?.value:(isF?g('ag-transp')?.value:null),
    endereco_fornecedor: isM?g('ag-end')?.value||null:null,
    destino:           isM?null:g('ag-dest')?.value||null,
    motorista_id:      isM?null:g('ag-mot')?.value||null,
    motorista_responsavel_id: isM?g('ag-resp')?.value||null:null,
    os_cc: g('ag-os')?.value||null,
    observacoes: g('ag-obs')?.value||null,
    status: 'Agendado',
  };

  if(editId) {
    await SB.from('agenda_veiculos').update(d).eq('id',editId);
  } else {
    const {error} = await SB.from('agenda_veiculos').insert(d);
    if(error){toast('Erro: '+error.message,'err');return;}
    // Atualizar status do veículo
    await SB.from('veiculos').update({status_operacional:'Agendado'}).eq('id',vid);
  }
  await loadData(); closeModal(); renderAgenda();

  // Notificação
  const v = VEICULOS.find(x=>x.id===vid);
  const motId = isM ? g('ag-resp')?.value : g('ag-mot')?.value;
  const mot = MOTORISTAS.find(m=>m.id===motId);
  if(mot && (mot.whatsapp||mot.telefone)) {
    const fone = (mot.whatsapp||mot.telefone).replace(/[\s\-\(\)\+]/g,'');
    let msg;
    if(isM) {
      msg = '🔧 *FleetControl - Agendamento de Manutenção*\n'
          + 'Placa: ' + (v?.placa||'') + '\n'
          + 'Data: ' + fmtD(data) + (d.hora?' às '+d.hora:'') + '\n'
          + 'Oficina: ' + (d.fornecedor_nome||'—') + '\n'
          + (d.endereco_fornecedor?'Endereço: '+d.endereco_fornecedor+'\n':'')
          + 'OS: ' + (d.os_cc||'—') + '\n'
          + (d.observacoes?'Obs: '+d.observacoes:'');
    } else {
      msg = (isF?'🚚':'🚗') + ' *FleetControl - Agendamento*\n'
          + 'Placa: ' + (v?.placa||'') + '\n'
          + 'Data: ' + fmtD(data) + (d.hora?' às '+d.hora:'') + '\n'
          + 'Destino: ' + (d.destino||'—') + '\n'
          + 'OS: ' + (d.os_cc||'—') + '\n'
          + (d.observacoes?'Obs: '+d.observacoes:'');
    }
    // Abrir WhatsApp com mensagem pré-preenchida
    const waUrl = 'https://wa.me/55' + fone + '?text=' + encodeURIComponent(msg);
    window.open(waUrl, '_blank');
    toast('✅ Agendado! WhatsApp aberto para notificar o motorista.');
  } else {
    toast('✅ Agendado! Cadastre WhatsApp do motorista para notificações automáticas.');
  }
}

let ocrTipo = 'manutencao', ocrWorker = null;

async function getOcrWorker() {
  if(!ocrWorker) ocrWorker = await Tesseract.createWorker('por',1,{logger:m=>{if(m.status==='recognizing text'){const p=g('ocr-prog');if(p)p.style.width=Math.round(m.progress*100)+'%';}}});
  return ocrWorker;
}

function abrirOCR(tipo) {
  ocrTipo = tipo||'manutencao';
  const titulo = {manutencao:'🔧 NF Manutenção por Arquivo',abastecimento:'⛽ NF Abastecimento',multa:'🚨 Auto de Infração'}[ocrTipo]||'📎 Lançar por Arquivo';
  openModal(titulo,`
    <div style="background:#eff6ff;border-radius:9px;padding:10px 13px;font-size:12px;color:#1e40af;margin-bottom:4px;line-height:1.7">
      📎 Selecione qualquer arquivo — <b>foto, PDF, Excel, Word ou print</b>.<br>
      O sistema extrai os dados e pede confirmação antes de lançar.
    </div>
    <div style="border:2px dashed #e5e7eb;border-radius:12px;padding:18px;text-align:center;cursor:pointer" onclick="g('ocr-inp').click()">
      <div id="ocr-prev"><div style="font-size:34px;margin-bottom:6px">📎</div><div style="font-size:13px;color:#6b7280">Toque para selecionar</div><div style="font-size:11px;color:#9ca3af;margin-top:3px">Foto · PDF · Excel (.xlsx) · Word (.docx) · Print</div></div>
    </div>
    <input type="file" id="ocr-inp" accept="image/*,.pdf,.xlsx,.xls,.docx,.doc" capture="environment" style="display:none" onchange="processarArq(this)">
    <div id="ocr-bar" style="display:none;margin:10px 0">
      <div style="font-size:12px;color:#6b7280;margin-bottom:5px" id="ocr-stxt">🔍 Processando arquivo...</div>
      <div style="height:8px;background:#f1f5f9;border-radius:999px;overflow:hidden"><div id="ocr-prog" style="height:100%;background:#1e3a5f;border-radius:999px;width:0%;transition:width .3s"></div></div>
    </div>
    <div id="ocr-res" style="display:none">
      <div id="ocr-msg2" style="border-radius:9px;padding:10px;font-size:12px;font-weight:500;margin-bottom:10px"></div>
      <div id="ocr-frm"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button onclick="closeModal()" style="flex:1;padding:10px;background:#fff;border:1.5px solid #e5e7eb;border-radius:9px;cursor:pointer;font-family:inherit">Cancelar</button>
      <button onclick="confirmarOCR()" id="ocr-ok" style="display:none;flex:1;padding:10px;background:#1e3a5f;color:#fff;border:none;border-radius:9px;cursor:pointer;font-weight:600;font-family:inherit">Confirmar e Lançar ✓</button>
    </div>`);
}

async function processarArq(input) {
  const file = input.files[0]; if(!file) return;
  const nm = file.name.toLowerCase();
  const stEl = g('ocr-stxt');
  g('ocr-bar').style.display='block';
  g('ocr-res').style.display='none';
  g('ocr-prev').innerHTML=`<div style="font-size:12px;color:#6b7280">📎 ${file.name}</div>`;

  try {
    let texto = '';
    if(file.type.startsWith('image/')) {
      if(stEl)stEl.textContent='🔍 Lendo imagem com OCR...';
      const url=URL.createObjectURL(file);
      g('ocr-prev').innerHTML=`<img src="${url}" style="max-height:120px;border-radius:8px;object-fit:contain">`;
      const w = await getOcrWorker();
      const {data:{text}} = await w.recognize(file);
      texto = text;
    } else if(nm.endsWith('.pdf')) {
      if(stEl)stEl.textContent='📄 Lendo PDF...';
      g('ocr-prog').style.width='30%';
      if(typeof pdfjsLib === 'undefined') throw new Error('PDF.js não carregado');
      const ab = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data:ab}).promise;
      for(let i=1;i<=Math.min(pdf.numPages,3);i++){
        const pg=await pdf.getPage(i);
        const ct=await pg.getTextContent();
        texto += ct.items.map(s=>s.str).join(' ')+'\n';
      }
      g('ocr-prog').style.width='80%';
      if(texto.trim().length<20) {
        if(stEl)stEl.textContent='🔍 PDF escaneado, usando OCR visual...';
        const pg=await pdf.getPage(1);
        const vp=pg.getViewport({scale:2});
        const cv=document.createElement('canvas');
        cv.width=vp.width;cv.height=vp.height;
        await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
        const blob=await new Promise(r=>cv.toBlob(r,'image/png'));
        const w=await getOcrWorker();
        const {data:{text}}=await w.recognize(blob);
        texto=text;
      }
    } else if(nm.endsWith('.xlsx')||nm.endsWith('.xls')) {
      if(stEl)stEl.textContent='📊 Lendo Excel...';
      if(typeof XLSX === 'undefined') throw new Error('SheetJS não carregado');
      const ab=await file.arrayBuffer();
      const wb=XLSX.read(ab,{type:'array'});
      texto=XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]]);
    } else if(nm.endsWith('.docx')||nm.endsWith('.doc')) {
      if(stEl)stEl.textContent='📝 Lendo Word...';
      if(typeof mammoth === 'undefined') throw new Error('Mammoth não carregado');
      const ab=await file.arrayBuffer();
      const r=await mammoth.extractRawText({arrayBuffer:ab});
      texto=r.value;
    } else {
      texto = file.name;
    }
    g('ocr-bar').style.display='none';
    parsearOCR(texto, file.name);
  } catch(e) {
    g('ocr-bar').style.display='none';
    mostrarOCR({}, `⚠️ ${e.message||'Erro ao processar'}. Preencha manualmente.`, false);
  }
}

function parsearOCR(txt, nome) {
  const d = {};
  const vm=txt.match(/R\$\s*([\d.]+,\d{2})/i)||txt.match(/(?:TOTAL|VALOR)[:\s]+([\d.,]+)/i);
  if(vm) d.valor=parseFloat(vm[1].replace(/\./g,'').replace(',','.'));
  const dm=txt.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if(dm) d.data=`${dm[3]}-${dm[2]}-${dm[1]}`;
  const nfm=txt.match(/NF[- ]?e?\s*[n°]?\s*(\d{3,})/i)||txt.match(/nota\s+fiscal\s*[n°]*\s*(\d+)/i);
  if(nfm) d.nf=`NF-e ${nfm[1]}`;
  const linhas=txt.split('\n').filter(l=>l.trim().length>4);
  const fl=linhas.find(l=>/[A-ZÁÉÍÓÚ]{5,}/.test(l)&&l.trim().length<80&&!/\d{2}\/\d{2}/.test(l));
  if(fl) d.forn=fl.trim().substring(0,60);
  mostrarOCR(d, `✅ Dados extraídos de "${nome}". Confira e preencha o que falta.`, true);
}

function mostrarOCR(d, msg, ok) {
  g('ocr-res').style.display='block';
  const m2=g('ocr-msg2');
  if(m2){m2.textContent=msg;m2.style.background=ok?'#f0fdf4':'#fffbeb';m2.style.border=`1px solid ${ok?'#86efac':'#fcd34d'}`;m2.style.color=ok?'#16a34a':'#92400e';}
  buildOCRForm(d);
  const btn=g('ocr-ok');if(btn)btn.style.display='block';
}

function buildOCRForm(d) {
  const vOpts=VEICULOS.filter(v=>v.status!=='Inativo').map(v=>({v:v.id,l:(isPesado(v.tipo)?'🚛':'🚗')+' '+v.placa+(v.modelo?' — '+v.modelo:'')}));
  const f=g('ocr-frm');if(!f)return;
  const base=`
    <div style="background:#fef2f2;border-radius:8px;padding:8px 12px;font-size:11px;color:#991b1b;font-weight:600;margin-bottom:8px">⚠️ Placa obrigatória — selecione abaixo</div>
    <div><label class="fl">Veículo / Placa *</label><select id="ocr-v" onchange="preencheOSAuto('ocr-os2')" style="${si};border-color:#dc2626">${sopts(vOpts,'','→ Selecione a placa')}</select></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="fl">Data</label><input type="date" id="ocr-dt" value="${d.data||today()}" style="${si}"></div>
      <div><label class="fl">Valor (R$)</label><input type="number" step="0.01" id="ocr-val" value="${d.valor||''}" style="${si}"></div>
    </div>
    <div><label class="fl">Fornecedor</label><input id="ocr-fo" value="${d.forn||''}" style="${si}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="fl">Nota Fiscal</label><input id="ocr-nf2" value="${d.nf||''}" style="${si}"></div>
      <div><label class="fl">KM Atual</label><input type="number" id="ocr-km2" style="${si}"></div>
    </div>
    <div><label class="fl">OS/CC (auto)</label><select id="ocr-os2" style="${si}">${osOpts()}</select></div>`;
  if(ocrTipo==='manutencao') f.innerHTML=base+`<div><label class="fl">Categoria *</label><select id="ocr-cat2" style="${si}">${sopts(CATS,'','Selecione')}</select></div><div><label class="fl">Descrição</label><input id="ocr-desc2" style="${si}"></div>`;
  else if(ocrTipo==='abastecimento') f.innerHTML=base+`<div><label class="fl">Combustível</label><select id="ocr-cb" style="${si}">${sopts(COMBS,'Diesel S10')}</select></div>`;
  else if(ocrTipo==='multa') f.innerHTML=base+`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label class="fl">Gravidade</label><select id="ocr-gv" style="${si}">${sopts(GRAVIDEZ,'Média')}</select></div><div><label class="fl">Pontos</label><input type="number" id="ocr-pt2" value="4" style="${si}"></div></div>`;
}

async function confirmarOCR() {
  const vid=g('ocr-v')?.value;
  if(!vid){toast('Selecione a placa do veículo!','err');g('ocr-v')?.focus();return;}
  try {
    const base={empresa_id:EMPRESA.id,veiculo_id:vid,data:g('ocr-dt')?.value||today(),fornecedor_nome:g('ocr-fo')?.value||'',km_atual:g('ocr-km2')?.value?parseInt(g('ocr-km2').value):null,os_cc:g('ocr-os2')?.value||''};
    if(ocrTipo==='manutencao'){
      if(!g('ocr-cat2')?.value){toast('Selecione a categoria','err');return;}
      await SB.from('manutencoes').insert({...base,tipo:'Corretiva',categoria:g('ocr-cat2').value,descricao:g('ocr-desc2')?.value||'',valor:g('ocr-val')?.value?parseFloat(g('ocr-val').value):null,nota_fiscal:g('ocr-nf2')?.value||''});

function filtrarFretes(){
  // Mapear empresa_ids para nomes
  const empMap={};EMPRESA && (empMap[EMPRESA.id]=EMPRESA.nome);
  return FRETES.filter(f=>{

    if(frF!=='todos'&&(f.tipo_frete||'')!==frF)return false;
    if(frEmpresa){const ea=(f.empresa_atendida||'').toLowerCase();if(!ea.includes(frEmpresa.toLowerCase()))return false;}
    if(frEmp&&(f.empresa_atendida||'').toUpperCase()!==frEmp.toUpperCase())return false;
    if(frOS&&String(f.os_cc||'')!==frOS)return false;
    if(frDI&&f.data_solicitacao&&f.data_solicitacao<frDI)return false;
    if(frDF&&f.data_solicitacao&&f.data_solicitacao>frDF)return false;
    if(frBusca){
      const b=frBusca.toLowerCase();
      if(!(f.local_coleta||'').toLowerCase().includes(b)&&
         !(f.local_entrega||'').toLowerCase().includes(b)&&
         !(f.transportadora||'').toLowerCase().includes(b)&&
         !(f.solicitante||'').toLowerCase().includes(b))return false;
    }
    return true;
  });
}

function renderFretesDash(filtered){

    if(!f.data_solicitacao)return;

    if(!porMes[m])porMes[m]={n:0,frota:0,terc:0};
    porMes[m].n++;
    if(f.tipo_frete==='Frota Própria')porMes[m].frota+=(f.valor_frete||0);
    else porMes[m].terc+=(f.valor_frete||0);

  const meses=Object.keys(porMes).sort();

  // Ranking transportadoras
  const porTransp={};
  filtered.forEach(f=>{const t=f.transportadora||'—';if(!porTransp[t])porTransp[t]={n:0,v:0,tipo:f.tipo_frete};porTransp[t].n++;porTransp[t].v+=(f.valor_frete||0);});
  const rankT=Object.entries(porTransp).sort((a,b)=>b[1].v-a[1].v).slice(0,8);
  const totalV=rankT.reduce((s,[,d])=>s+d.v,0);

      <div style="padding:9px 14px;border-bottom:1px solid #f9fafb">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:11px;font-weight:700;color:#9ca3af;width:18px">${i+1}</span>
            <span style="background:${isFr?'#eff6ff':'#f0fdf4'};color:${isFr?'#2563eb':'#16a34a'};font-size:9px;padding:1px 6px;border-radius:5px;font-weight:700">${d.tipo==='Frota Própria'?'FROTA':'TERC.'}</span>
            <span style="font-weight:600;font-size:12px;color:#111827">${t}</span>
            <span style="font-size:10px;color:#9ca3af">${d.n} fretes</span>
          </div>
          <span style="font-size:12px;font-weight:700">${fmt$(d.v)} (${pct}%)</span>
        </div>
        <div style="height:5px;background:#f1f5f9;border-radius:999px;overflow:hidden"><div style="height:100%;border-radius:999px;background:${isFr?'#2563eb':'#16a34a'};width:${pct}%"></div></div>
      </div>`;}).join('')}
    </div>
    <div class="card2">
      <div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:13px">🏭 Por empresa atendida</div>
      ${Object.entries(porEmp).sort((a,b)=>b[1].v-a[1].v).map(([emp,d])=>{const tot=filtered.reduce((s,f)=>s+(f.valor_frete||0),0);const pct=tot?Math.round(d.v/tot*100):0;return`
      <div style="padding:9px 14px;border-bottom:1px solid #f9fafb">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:600;font-size:12px;color:#111827">${emp}</span><span style="font-size:12px;font-weight:700">${fmt$(d.v)} (${pct}%)</span></div>
        <div style="height:5px;background:#f1f5f9;border-radius:999px;overflow:hidden"><div style="height:100%;border-radius:999px;background:#7c3aed;width:${pct}%"></div></div>
      </div>`;}).join('')}
    </div>
  `;
  setTimeout(()=>{
    const ctx=document.getElementById('ch-fr-mes');if(!ctx)return;
    Object.keys(_ch).filter(k=>k.startsWith('fr-')).forEach(k=>dch(k));

}

async function mudarStatusFrete(fid, novoStatus){
  const f=FRETES.find(x=>x.id===fid);if(!f)return;
  const obs=g('fr-obs-hist')?.value||'';
  const hist=Array.isArray(f.historico)?f.historico:[];
  hist.push({data:today(),status:novoStatus,obs});
  await SB.from('fretes').update({status:novoStatus,historico:JSON.stringify(hist),updated_at:new Date().toISOString()}).eq('id',fid);
  await loadData();closeModal();renderFretes();toast('Status atualizado!');
}

  fid = fid || null;

function openModal(t,h){

// ── WHATSAPP CALLMEBOT ────────────────────────────────────
async function enviarWhatsApp(telefone, chave, mensagem) {
  if(!telefone || !chave) return false;
  try {
    const phone = telefone.replace(/[\s\-\(\)]/g,'');
    const url = `https://api.callmebot.com/whatsapp.php?phone=${encodeURIComponent(phone)}&text=${encodeURIComponent(mensagem)}&apikey=${chave}`;
    await fetch(url, {mode:'no-cors'});
    return true;
  } catch(e) { return false; }
}

async function notificarMotorista(motoristaId, mensagem, emailParams) {
  const mot = MOTORISTAS.find(m => m.id === motoristaId);
  if(!mot) return false;
  let ok = false;
  if(mot.whatsapp && mot.callmebot_key) {
    ok = await enviarWhatsApp(mot.whatsapp, mot.callmebot_key, mensagem);
  }
  if(mot.email && EMAILJS_READY && window.emailjs) {
    try { await emailjs.send(EMAILJS_SERVICE_ID, emailParams.template, {...emailParams.params, to_email:mot.email, to_name:mot.nome}); ok=true; }
    catch(e) {}
  }
  return ok;
}

function renderOSCC(){
  const el2=g('tab-oscc');if(!el2)return;
  // Filtros
  if(!window._osccFiltros) window._osccFiltros = {di:'',df:'',cat:'',os:''};
  const F = window._osccFiltros;
  const allOS = [...new Set(OSCC_CADS.map(o=>o.codigo))].sort();
  // Filtrar manutenções e abastecimentos
  const filtM = MANUTENCOES.filter(m=>{
    if(F.di&&m.data&&m.data<F.di)return false;
    if(F.df&&m.data&&m.data>F.df)return false;
    if(F.cat&&(m.categoria||'')!==F.cat)return false;
    if(F.os&&String(m.os_cc||'')!==String(F.os))return false;
    return true;
  });
  const filtA = ABASTECIMENTOS.filter(a=>{
    if(F.di&&a.data&&a.data<F.di)return false;
    if(F.df&&a.data&&a.data>F.df)return false;
    if(F.os&&String(a.os_cc||'')!==String(F.os))return false;
    return true;
  });
  const totalGeral = filtM.reduce((s,m)=>s+(m.valor||0),0) + filtA.reduce((s,a)=>s+(a.valor_total||0),0);
  el2.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-weight:700;font-size:16px;color:#111827">OS / Centro de Custo</span>
      <button onclick="abrirFormOSCC()" style="background:#1e3a5f;color:#fff;border:none;border-radius:9px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">+ Nova OS</button>
    </div>
    <!-- Filtros -->
    <div style="background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:12px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:#374151;margin-bottom:8px">🔍 Filtros</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:3px">Data inicial</label><input type="date" value="${F.di}" onchange="window._osccFiltros.di=this.value;renderOSCC()" style="${si}"></div>
        <div><label style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:3px">Data final</label><input type="date" value="${F.df}" onchange="window._osccFiltros.df=this.value;renderOSCC()" style="${si}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><label style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:3px">Categoria</label><select onchange="window._osccFiltros.cat=this.value;renderOSCC()" style="${ss}"><option value="">Todas</option>${CATS.map(c=>`<option value="${c}"${c===F.cat?' selected':''}>${c}</option>`).join('')}</select></div>
        <div><label style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:3px">OS / CC</label><select onchange="window._osccFiltros.os=this.value;renderOSCC()" style="${ss}"><option value="">Todas</option>${allOS.map(o=>`<option value="${o}"${o===F.os?' selected':''}>${o}</option>`).join('')}</select></div>
      </div>
      ${F.di||F.df||F.cat||F.os?`<button onclick="window._osccFiltros={di:'',df:'',cat:'',os:''};renderOSCC()" style="margin-top:8px;background:transparent;border:none;color:#dc2626;cursor:pointer;font-family:inherit;font-size:12px">✕ Limpar filtros</button>`:''}
    </div>
    <!-- Total geral -->
    <div style="background:#1e3a5f;border-radius:12px;padding:14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <div style="color:rgba(255,255,255,.8);font-size:12px">Total do período</div>
      <div style="color:#fff;font-size:20px;font-weight:700">${fmt$(totalGeral)}</div>
    </div>
    <!-- OS Cards -->
    ${OSCC_CADS.map(o=>{
      const tm=filtM.filter(m=>String(m.os_cc)===String(o.codigo));
      const ta=filtA.filter(a=>String(a.os_cc)===String(o.codigo));
      const totalM=tm.reduce((s,m)=>s+(m.valor||0),0);
      const totalC=ta.reduce((s,a)=>s+(a.valor_total||0),0);
      const total=totalM+totalC;
      if(total===0&&(F.di||F.df||F.cat||F.os))return '';
      // Por categoria
      const porCat={};tm.forEach(m=>{const c=m.categoria||'Outros';porCat[c]=(porCat[c]||0)+(m.valor||0);});
      const catSorted=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
      return `<div class="card2" style="margin-bottom:10px">
        <div style="padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e5e7eb">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;gap:10px;align-items:center">
              <span style="background:#1e3a5f;color:#fff;font-weight:700;font-size:14px;padding:5px 12px;border-radius:8px">OS ${o.codigo}</span>
              <div><div style="font-weight:700;font-size:13px;color:#111827">${o.descricao||'—'}</div><div style="font-size:11px;color:#9ca3af">${o.local_cliente||'—'}</div></div>
              <span style="background:${o.status==='Ativo'?'#f0fdf4':'#f1f5f9'};color:${o.status==='Ativo'?'#16a34a':'#6b7280'};font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700">${o.status||'Ativo'}</span>
            </div>
            <button onclick="abrirFormOSCC('${o.id}')" style="background:transparent;border:none;cursor:pointer;font-size:16px">✏️</button>
          </div>
        </div>
        <div style="padding:12px 16px">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
            <div style="background:#f8fafc;border-radius:9px;padding:10px;text-align:center"><div style="font-size:14px;font-weight:700;color:#111827">${fmt$(totalM)}</div><div style="font-size:10px;color:#6b7280">Manutenção</div></div>
            <div style="background:#f8fafc;border-radius:9px;padding:10px;text-align:center"><div style="font-size:14px;font-weight:700;color:#16a34a">${fmt$(totalC)}</div><div style="font-size:10px;color:#6b7280">Combustível</div></div>
            <div style="background:#1e3a5f;border-radius:9px;padding:10px;text-align:center"><div style="font-size:14px;font-weight:700;color:#fff">${fmt$(total)}</div><div style="font-size:10px;color:rgba(255,255,255,.7)">Total</div></div>
          </div>
          ${catSorted.length?`<div style="font-size:11px;font-weight:700;color:#374151;margin-bottom:6px">Por categoria:</div>
          ${catSorted.slice(0,6).map(([cat,val])=>{const pct=totalM?Math.round(val/totalM*100):0;return`<div style="margin-bottom:5px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span style="color:#374151">${cat}</span><span style="font-weight:600">${fmt$(val)} (${pct}%)</span></div><div style="height:4px;background:#f1f5f9;border-radius:999px;overflow:hidden"><div style="height:100%;border-radius:999px;background:#2563eb;width:${pct}%"></div></div></div>`;}).join('')}`:''}
        </div>
      </div>`;
    }).join('')}
    ${OSCC_CADS.length===0?'<p class="empty">Nenhuma OS cadastrada</p>':''}`;
}
